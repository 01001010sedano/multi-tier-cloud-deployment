global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # Prometheus self-monitoring (always UP)
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  # Monitor the Docker host machine
  - job_name: "docker-host"
    static_configs:
      - targets: ["host.docker.internal:9090"]
